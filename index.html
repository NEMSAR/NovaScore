<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaBit - Padel Scoreboard Pro</title>
    
    <link rel="icon" href="https://i.imgur.com/FnYqHyv.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Mapas de importación para usar ES Modules nativos en el navegador -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
            }
        }
    </script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        @keyframes slideInRight { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes tournamentPointPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(251,191,36,0.6)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(251,191,36,1)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(251,191,36,0.6)); }
        }
        .animate-tournament-point { animation: tournamentPointPulse 2s ease-in-out infinite; }
        body { margin: 0; overflow: hidden; background-color: #0a0a0c; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, deleteDoc } from 'firebase/firestore';

        // --- CONFIGURACIÓN DE FIREBASE ---
        // (Nota: Si vas a hospedar en GitHub, debes reemplazar este bloque 'firebaseConfig' con las credenciales de tu proyecto de Firebase. 
        // Mientras lo pruebes aquí en la plataforma, usará el predeterminado automático).
        let firebaseConfig = {
            apiKey: "AIzaSyC3zt607wskM2ax9fxVQM7qRrsMxvepjss",
            authDomain: "novascore-24ab5.firebaseapp.com",
            projectId: "novascore-24ab5",
            storageBucket: "novascore-24ab5.firebasestorage.app",
            messagingSenderId: "504663563166",
            appId: "1:504663563166:web:0fe795abfa02818d94948f"
        };
        
        try {
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
            }
        } catch(e) { console.warn("Usando config de Firebase por defecto."); }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'novabit-padel';

        // --- CONSTANTES GLOBALES ---
        const MASTER_PIN = 'NOVA2026'; // CONTRASEÑA PARA ENTRAR AL CMS DE LA AGENCIA
        const POINTS = ['0', '15', '30', '40', 'Ad'];
        const THEMES = {
            pink: { name: 'MASTER (Rosa)', bg1: 'bg-pink-600', bg2: 'bg-indigo-600', text: 'text-pink-500', gradient: 'from-pink-500 to-indigo-500', border: 'border-pink-500', shadow: 'shadow-pink-500/20' },
            blue: { name: 'OPEN (Azul)', bg1: 'bg-cyan-500', bg2: 'bg-blue-700', text: 'text-cyan-400', gradient: 'from-cyan-400 to-blue-600', border: 'border-cyan-400', shadow: 'shadow-cyan-500/20' },
            gold: { name: 'FINALS (Dorado)', bg1: 'bg-yellow-500', bg2: 'bg-orange-700', text: 'text-yellow-400', gradient: 'from-yellow-400 to-orange-500', border: 'border-yellow-400', shadow: 'shadow-yellow-500/20' }
        };
        const TOURNAMENT_PHASES = ["Fase de Grupos", "Dieciseisavos", "Octavos", "Cuartos", "Semifinales", "Final"];
        
        const DEFAULT_GAME_STATE = {
            activeView: 'scoreboard',
            category: 'MASCULINO',
            theme: 'pink',
            tournamentLogo: '', 
            tournamentPhase: 'Final', 
            team1: { p1: 'JUGADOR 1', p2: 'JUGADOR 2', sets: [0, 0, 0], points: '0', tbPoints: 0 },
            team2: { p1: 'JUGADOR 3', p2: 'JUGADOR 4', sets: [0, 0, 0], points: '0', tbPoints: 0 },
            server: 1, currentSet: 0, isTieBreak: false, tvAlert: '',
            timeLeft: 300, isTimerRunning: false, matchClock: 0, isMatchClockRunning: false,
            sponsors: ["TORNEO PATROCINADO POR: RED BULL", "VISITA NUESTRO BAR PARA BEBIDAS FRÍAS"]
        };

        const BackgroundFX = ({ activeView, themeKey }) => {
            const theme = THEMES[themeKey] || THEMES.pink;
            return (
                <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
                    <div className={`absolute top-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full mix-blend-screen filter blur-[120px] opacity-40 animate-pulse transition-colors duration-1000 ${activeView === 'halftime' ? 'bg-indigo-900' : theme.bg1}`}></div>
                    <div className={`absolute bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] rounded-full mix-blend-screen filter blur-[100px] opacity-40 transition-colors duration-1000 ${activeView === 'halftime' ? 'bg-cyan-900' : theme.bg2}`}></div>
                    <div className="absolute top-[40%] left-[40%] w-[30vw] h-[30vw] bg-purple-600 rounded-full mix-blend-screen filter blur-[150px] opacity-10"></div>
                    <div className="absolute inset-0 opacity-[0.03]" style={{ backgroundImage: 'radial-gradient(#fff 1px, transparent 1px)', backgroundSize: '30px 30px' }}></div>
                </div>
            );
        };

        function App() {
            // Estado de Autenticación
            const [user, setUser] = useState(null);
            const [authMode, setAuthMode] = useState('login'); // 'login', 'admin_cms', 'scoreboard'
            const [pinInput, setPinInput] = useState('');
            const [authError, setAuthError] = useState('');
            
            // Estado de Scoreboard y CMS
            const [activePin, setActivePin] = useState(null);
            const [gameState, setGameState] = useState(DEFAULT_GAME_STATE);
            const [globalSponsors, setGlobalSponsors] = useState([]);
            const [tournamentsList, setTournamentsList] = useState([]);
            
            // UI Local
            const [showControls, setShowControls] = useState(false);
            const [isPublicMode, setIsPublicMode] = useState(false);
            const [currentSponsorIdx, setCurrentSponsorIdx] = useState(0);
            const [currentLogoIdx, setCurrentLogoIdx] = useState(0);

            // Bloqueo de teclado
            useEffect(() => {
                const block = (e) => {
                    if(e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) e.preventDefault();
                };
                window.addEventListener('contextmenu', e => e.preventDefault());
                window.addEventListener('keydown', block);
                return () => { window.removeEventListener('contextmenu', e => e.preventDefault()); window.removeEventListener('keydown', block); };
            }, []);

            // INICIALIZACIÓN DE FIREBASE (Regla 3: Auth First)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (e) { console.error("Error Auth:", e); }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    // Chequear si entra por URL de pantalla pública
                    const urlParams = new URLSearchParams(window.location.search);
                    const urlPin = urlParams.get('pin');
                    if (urlParams.get('display') === 'true') setIsPublicMode(true);
                    
                    if (urlPin && u) {
                        validateAndLoadTournament(urlPin);
                    }
                });
                return () => unsubscribe();
            }, []);

            // Suscripción Global Sponsors
            useEffect(() => {
                if (!user) return;
                const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'globalSponsors', 'main'), (docSnap) => {
                    if (docSnap.exists()) {
                        setGlobalSponsors(docSnap.data().logos || []);
                    }
                });
                return () => unsub();
            }, [user]);

            // Función de Validación de PIN
            const validateAndLoadTournament = async (pinStr) => {
                if (!user) return;
                
                if (pinStr === MASTER_PIN) {
                    setAuthMode('admin_cms');
                    return;
                }

                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', pinStr);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (Date.now() > data.expiresAt) {
                            setAuthError("Este código ha caducado.");
                        } else {
                            setActivePin(pinStr);
                            setAuthMode('scoreboard');
                        }
                    } else {
                        setAuthError("PIN Invalido o no existe.");
                    }
                } catch (error) {
                    setAuthError("Error de conexión.");
                }
            };

            const handleLoginSubmit = (e) => {
                e.preventDefault();
                setAuthError('');
                validateAndLoadTournament(pinInput);
            };

            // Suscripción de Estado de Juego
            useEffect(() => {
                if (!user || authMode !== 'scoreboard' || !activePin) return;
                const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'scoreboards', activePin), (docSnap) => {
                    if (docSnap.exists()) {
                        setGameState(docSnap.data().gameState);
                    }
                }, (err) => console.error(err));
                return () => unsub();
            }, [user, authMode, activePin]);

            // Temporizadores Locales (Actualizan Firestore cada segundo para sincronía fina)
            useEffect(() => {
                let intervalId = null;
                if (authMode === 'scoreboard' && !isPublicMode && activePin && (gameState.isTimerRunning || gameState.isMatchClockRunning)) {
                    intervalId = setInterval(() => {
                        let updates = {};
                        if (gameState.isTimerRunning && gameState.timeLeft > 0) {
                            updates.timeLeft = gameState.timeLeft - 1;
                        } else if (gameState.isTimerRunning && gameState.timeLeft <= 0) {
                            updates.isTimerRunning = false;
                        }

                        if (gameState.isMatchClockRunning) {
                            updates.matchClock = gameState.matchClock + 1;
                        }
                        
                        if (Object.keys(updates).length > 0) {
                            pushUpdate(updates);
                        }
                    }, 1000);
                }
                return () => clearInterval(intervalId);
            }, [gameState.isTimerRunning, gameState.isMatchClockRunning, gameState.timeLeft, gameState.matchClock, authMode, isPublicMode, activePin]);

            // Rotaciones Visuales Locales
            useEffect(() => {
                if (gameState.sponsors?.length > 0) {
                    const i = setInterval(() => setCurrentSponsorIdx(p => (p + 1) % gameState.sponsors.length), 5000);
                    return () => clearInterval(i);
                }
            }, [gameState.sponsors?.length]);

            useEffect(() => {
                if (gameState.activeView === 'sponsor_full' && globalSponsors.length > 0) {
                    const i = setInterval(() => setCurrentLogoIdx(p => (p + 1) % globalSponsors.length), 4000);
                    return () => clearInterval(i);
                }
            }, [gameState.activeView, globalSponsors.length]);

            // Función Maestra de Update hacia la Base de Datos
            const pushUpdate = async (updates) => {
                if (!activePin || isPublicMode) return;
                const newState = { ...gameState, ...updates };
                // Actualizamos estado local rápido
                setGameState(newState);
                // Subimos a Firebase (Debounce implícito por Firestore)
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scoreboards', activePin), { gameState: newState });
                } catch (e) { console.error("Update fail:", e); }
            };

            // Helpers de Puntuación
            const handlePoints = (teamNum, direction) => {
                const teamKey = teamNum === 1 ? 'team1' : 'team2';
                const team = gameState[teamKey];
                if (gameState.isTieBreak) {
                    let newTb = team.tbPoints;
                    if (direction === 'up') newTb++;
                    if (direction === 'down' && newTb > 0) newTb--;
                    pushUpdate({ [teamKey]: { ...team, tbPoints: newTb } });
                } else {
                    const curr = POINTS.indexOf(team.points);
                    let nIdx = curr;
                    if (direction === 'up' && curr < POINTS.length - 1) nIdx++;
                    if (direction === 'down' && curr > 0) nIdx--;
                    pushUpdate({ [teamKey]: { ...team, points: POINTS[nIdx] } });
                }
            };

            const updateGames = (teamNum, direction) => {
                const teamKey = teamNum === 1 ? 'team1' : 'team2';
                const team = gameState[teamKey];
                let newSets = [...team.sets];
                if (direction === 'up' && newSets[gameState.currentSet] < 7) newSets[gameState.currentSet]++;
                if (direction === 'down' && newSets[gameState.currentSet] > 0) newSets[gameState.currentSet]--;
                pushUpdate({ [teamKey]: { ...team, sets: newSets } });
            };

            const formatTime = (seconds, includeHours = false) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                if (includeHours && h > 0) return `${h}:${m}:${s}`;
                return `${m}:${s}`;
            };

            // --- VISTAS DEL SISTEMA ---

            if (authMode === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center relative">
                        <BackgroundFX activeView="scoreboard" themeKey="pink" />
                        <div className="z-10 bg-black/60 backdrop-blur-2xl p-10 rounded-2xl border border-white/10 shadow-[0_0_50px_rgba(219,39,119,0.3)] w-full max-w-md text-center text-white">
                            <div className="mx-auto w-20 h-20 bg-pink-600/20 rounded-full flex items-center justify-center mb-6 border border-pink-500/50">
                                <i className="fa-solid fa-shield-halved text-pink-500 text-[36px]"></i>
                            </div>
                            <h1 className="text-2xl font-black tracking-widest uppercase mb-2">Acceso al Sistema</h1>
                            <p className="text-gray-400 text-sm tracking-wider mb-8">INTRODUZCA SU PIN DE TORNEO</p>
                            
                            <form onSubmit={handleLoginSubmit} className="space-y-6">
                                <div>
                                    <div className="relative">
                                        <i className="fa-solid fa-key absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500 text-[20px]"></i>
                                        <input type="password" value={pinInput} onChange={e => setPinInput(e.target.value)} placeholder="000000" className="w-full bg-black/50 border border-white/20 text-white font-bold text-center text-2xl py-4 rounded-xl focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition-all tracking-[0.5em]" autoFocus/>
                                    </div>
                                    {authError && <p className="text-red-500 text-xs font-bold mt-3 animate-pulse tracking-widest uppercase">{authError}</p>}
                                </div>
                                <button type="submit" className="w-full bg-gradient-to-r from-pink-600 to-indigo-600 text-white font-black py-4 rounded-xl uppercase tracking-widest hover:opacity-90 transition-opacity shadow-lg">CONECTAR</button>
                            </form>
                        </div>
                        <div className="absolute bottom-8 flex flex-col items-center opacity-50 text-white">
                            <img src="https://i.imgur.com/FnYqHyv.png" alt="NovaBit" className="h-10 mb-2 object-contain" />
                            <span className="text-[9px] font-bold tracking-[0.2em] uppercase">Powered by NovaBit Media Agency</span>
                            <span className="text-[7px] text-gray-400 tracking-[0.2em] uppercase mt-1">Todos los derechos reservados</span>
                        </div>
                    </div>
                );
            }

            // --- VISTA CMS (PANEL DE AGENCIA) ---
            if (authMode === 'admin_cms') {
                return <AdminCMS db={db} user={user} appId={appId} setAuthMode={setAuthMode} globalSponsors={globalSponsors} />;
            }

            // --- VISTA PRINCIPAL (SCOREBOARD OPERATOR / DISPLAY) ---
            const activeTheme = THEMES[gameState.theme] || THEMES.pink;

            return (
                <div className="min-h-screen text-white relative flex flex-col">
                    <BackgroundFX activeView={gameState.activeView} themeKey={gameState.theme} />

                    {!isPublicMode && (
                        <button onClick={() => setShowControls(true)} className={`fixed bottom-6 right-6 z-50 ${activeTheme.bg1} backdrop-blur-md p-4 rounded-full border border-white/20 shadow-xl hover:scale-110 transition-transform`}>
                            <i className="fa-solid fa-gear text-[28px]"></i>
                        </button>
                    )}

                    {/* MENÚ DE CONTROL LATERAL */}
                    {!isPublicMode && (
                        <div className={`fixed right-0 top-0 h-full w-[450px] bg-gray-900/95 backdrop-blur-xl border-l border-white/10 z-50 transform transition-transform duration-500 ease-in-out ${showControls ? 'translate-x-0' : 'translate-x-full'} shadow-2xl flex flex-col`} onContextMenu={(e) => e.stopPropagation()}>
                            <div className="p-4 border-b border-white/10 flex justify-between items-center bg-black/80">
                                <h2 className={`text-xl font-black tracking-widest ${activeTheme.text} flex items-center gap-2`}>
                                    <i className="fa-solid fa-gamepad text-[20px]"></i> OPERADOR
                                </h2>
                                <div className="flex gap-4 items-center">
                                    <span className="text-[10px] bg-green-500/20 text-green-400 px-2 py-1 rounded border border-green-500/30">PIN: {activePin}</span>
                                    <button onClick={() => setShowControls(false)} className="text-gray-400 hover:text-white"><i className="fa-solid fa-xmark text-[24px]"></i></button>
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto p-5 space-y-6 text-sm custom-scrollbar">
                                {/* Botón Pantalla 2 */}
                                <button onClick={() => window.open(`${window.location.pathname}?pin=${activePin}&display=true`, 'PantallaTV', 'width=1280,height=720')} className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 rounded font-bold flex items-center justify-center gap-2 transition-colors shadow-lg shadow-indigo-500/20">
                                    <i className="fa-solid fa-tv text-[16px]"></i> LANZAR PANTALLA PÚBLICA (TV)
                                </button>
                                
                                <div className="bg-white/5 border border-white/10 rounded-lg p-3 space-y-3">
                                    <div className="grid grid-cols-3 gap-2">
                                        <div className="space-y-1">
                                            <label className="text-gray-400 font-bold text-[9px] uppercase"><i className="fa-solid fa-venus-mars"></i> CATEGORÍA</label>
                                            <select value={gameState.category} onChange={e => pushUpdate({category: e.target.value})} className="bg-black/50 border border-white/20 text-white text-[10px] rounded p-1.5 w-full">
                                                <option value="MASCULINO">MASCULINO</option><option value="FEMENINO">FEMENINO</option><option value="MIXTO">MIXTO</option>
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-gray-400 font-bold text-[9px] uppercase"><i className="fa-solid fa-palette"></i> TEMA</label>
                                            <select value={gameState.theme} onChange={e => pushUpdate({theme: e.target.value})} className="bg-black/50 border border-white/20 text-white text-[10px] rounded p-1.5 w-full">
                                                {Object.entries(THEMES).map(([k, v]) => <option key={k} value={k}>{v.name}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-gray-400 font-bold text-[9px] uppercase"><i className="fa-solid fa-sitemap"></i> FASE</label>
                                            <select value={gameState.tournamentPhase} onChange={e => pushUpdate({tournamentPhase: e.target.value})} className="bg-black/50 border border-white/20 text-white text-[10px] rounded p-1.5 w-full">
                                                {TOURNAMENT_PHASES.map(f => <option key={f} value={f}>{f}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="space-y-1 pt-2 border-t border-white/10">
                                        <label className="text-gray-400 font-bold text-[10px] uppercase"><i className="fa-regular fa-image"></i> LOGO TORNEO URL</label>
                                        <input type="text" value={gameState.tournamentLogo} onChange={e => pushUpdate({tournamentLogo: e.target.value})} className="w-full bg-black/50 border border-white/20 text-white text-xs rounded px-2 py-1.5" />
                                    </div>
                                </div>

                                {/* Cambio de Vistas */}
                                <div className="space-y-2">
                                    <label className="text-gray-400 font-bold tracking-wider text-xs uppercase">CONTROL DE PANTALLA</label>
                                    <div className="grid grid-cols-4 gap-2">
                                        {[{ id: 'scoreboard', icon: 'fa-desktop', label: 'MARCADOR' }, { id: 'warmup', icon: 'fa-fire', label: 'CALENTAR' }, { id: 'halftime', icon: 'fa-mug-hot', label: 'DESCANSO' }, { id: 'sponsor_full', icon: 'fa-bolt', label: 'SPONSOR' }].map(v => (
                                            <button key={v.id} onClick={() => pushUpdate({activeView: v.id})} className={`py-2 rounded border font-bold flex flex-col items-center gap-1 transition-all text-[10px] ${gameState.activeView === v.id ? 'bg-white text-black border-white' : 'border-white/10 text-gray-400 hover:bg-white/5'}`}>
                                                <i className={`fa-solid ${v.icon} text-[14px]`}></i> {v.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Alertas y Tiempos */}
                                <div className="bg-black/40 p-3 rounded-lg border border-white/5 space-y-3">
                                    <div className="flex justify-between items-center border-b border-white/10 pb-2">
                                        <label className="text-gray-400 font-bold text-xs uppercase"><i className="fa-solid fa-triangle-exclamation"></i> ALERTAS TV</label>
                                        <button onClick={() => pushUpdate({tvAlert: ''})} className="text-[10px] bg-red-500/20 text-red-400 px-2 py-1 rounded">LIMPIAR</button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        {['PUNTO DE ORO', 'SET POINT', 'MATCH POINT', 'TOURNAMENT POINT'].map(alert => (
                                            <button key={alert} onClick={() => pushUpdate({tvAlert: alert})} className={`py-2 text-[10px] font-bold rounded border ${gameState.tvAlert === alert ? (alert === 'TOURNAMENT POINT' ? 'bg-amber-600 text-white border-amber-400' : 'bg-white text-black border-white') : 'bg-gray-800 text-gray-400 border-gray-700'}`}>{alert}</button>
                                        ))}
                                    </div>
                                    
                                    <div className="flex justify-between items-center pt-2 border-t border-white/10">
                                        <label className="text-gray-400 font-bold text-xs uppercase"><i className="fa-solid fa-stopwatch"></i> TIEMPO PARTIDO</label>
                                        <div className="flex items-center gap-2">
                                            <span className="font-mono font-bold">{formatTime(gameState.matchClock, true)}</span>
                                            <button onClick={() => pushUpdate({isMatchClockRunning: !gameState.isMatchClockRunning})} className={`px-2 py-1 rounded text-[10px] font-bold ${gameState.isMatchClockRunning ? 'bg-red-500/20 text-red-400' : 'bg-green-500/20 text-green-400'}`}>{gameState.isMatchClockRunning ? 'PAUSAR' : 'INICIAR'}</button>
                                        </div>
                                    </div>

                                    <div className="pt-2 border-t border-white/10 space-y-2">
                                        <label className="text-gray-400 font-bold text-xs uppercase"><i className="fa-solid fa-hourglass-half"></i> RELOJ CALENTAMIENTO/DESCANSO</label>
                                        <div className="flex justify-between items-center bg-black/50 p-2 rounded">
                                            <span className="font-mono font-bold text-xl">{formatTime(gameState.timeLeft)}</span>
                                            <div className="flex gap-1">

        // --- COMPONENTE CMS (PANEL MAESTRO DE AGENCIA) ---
        function AdminCMS({ db, user, appId, setAuthMode, globalSponsors }) {
            const [tournaments, setTournaments] = useState([]);
            const [clientName, setClientName] = useState('');
            const [daysValid, setDaysValid] = useState(1);
            const [newLogoUrl, setNewLogoUrl] = useState('');
            const [customLogo, setCustomLogo] = useState(''); // NUEVO: Estado para el logo predefinido

            useEffect(() => {
                const unsub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'tournaments'), (snap) => {
                    const list = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    setTournaments(list);
                });
                return () => unsub();
            }, []);

            const generatePin = () => Math.floor(100000 + Math.random() * 900000).toString();

            const handleCreateTournament = async (e) => {
                e.preventDefault();
                if(!clientName) return;
                const pin = generatePin();
                const expiresAt = Date.now() + (daysValid * 24 * 60 * 60 * 1000); // Ms
                
                try {
                    // Crea PIN en db
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', pin), { pin, clientName, expiresAt, createdAt: Date.now() });
                    
                    // Crea el State Base inyectando el logo predefinido
                    const initialState = { ...DEFAULT_GAME_STATE, tournamentLogo: customLogo };
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scoreboards', pin), { gameState: initialState });
                    
                    setClientName('');
                    setCustomLogo(''); // Limpia el campo
                } catch(e) { console.error("Error creando:", e); }
            };

            const handleDelete = async (pin) => {
                if(!window.confirm('¿Borrar este torneo?')) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', pin));
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scoreboards', pin));
            };

            const addGlobalSponsor = async () => {
                if(!newLogoUrl) return;
                const updated = [...globalSponsors, newLogoUrl];
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'globalSponsors', 'main'), { logos: updated });
                setNewLogoUrl('');
            };

            const removeGlobalSponsor = async (idx) => {
                const updated = [...globalSponsors];
                updated.splice(idx, 1);
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'globalSponsors', 'main'), { logos: updated });
            };

            return (
                <div className="min-h-screen bg-gray-900 text-white p-8 font-sans">
                    <div className="max-w-6xl mx-auto space-y-8">
                        <div className="flex justify-between items-center border-b border-white/10 pb-4">
                            <div className="flex items-center gap-4">
                                <img src="https://i.imgur.com/FnYqHyv.png" className="h-10" />
                                <div><h1 className="text-2xl font-black tracking-widest text-pink-500 uppercase">NovaBit CMS Master</h1><p className="text-gray-400 text-xs tracking-[0.2em]">PANEL DE GESTIÓN DE SERVICIOS</p></div>
                            </div>
                            <button onClick={() => setAuthMode('login')} className="bg-white/10 hover:bg-white/20 px-4 py-2 rounded font-bold text-xs"><i className="fa-solid fa-right-from-bracket"></i> CERRAR SESIÓN</button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            {/* CREAR LICENCIAS */}
                            <div className="bg-black/40 p-6 rounded-xl border border-white/5 space-y-6">
                                <h2 className="text-xl font-bold tracking-widest uppercase border-b border-white/10 pb-2"><i className="fa-solid fa-key text-pink-500"></i> Generar Licencia</h2>
                                <form onSubmit={handleCreateTournament} className="space-y-4">
                                    <div><label className="text-xs text-gray-400 font-bold">NOMBRE DEL CLIENTE/TORNEO</label><input type="text" value={clientName} onChange={e=>setClientName(e.target.value)} className="w-full bg-black/50 border border-white/20 rounded p-3 text-white mt-1" required/></div>
                                    
                                    {/* NUEVO CAMPO: Logo predefinido desde el CMS */}
                                    <div><label className="text-xs text-gray-400 font-bold">LOGO DEL TORNEO (URL OPCIONAL)</label><input type="text" value={customLogo} onChange={e=>setCustomLogo(e.target.value)} placeholder="https://..." className="w-full bg-black/50 border border-white/20 rounded p-3 text-white mt-1"/></div>
                                    
                                    <div>
                                        <label className="text-xs text-gray-400 font-bold">DURACIÓN DEL SERVICIO</label>
                                        <select value={daysValid} onChange={e=>setDaysValid(Number(e.target.value))} className="w-full bg-black/50 border border-white/20 rounded p-3 text-white mt-1">
                                            <option value={1}>1 Día (Prueba / Express)</option><option value={3}>3 Días (Fin de Semana)</option><option value={7}>7 Días (Semana Completa)</option><option value={30}>30 Días (Mensual)</option>
                                        </select>
                                    </div>
                                    <button type="submit" className="w-full bg-pink-600 hover:bg-pink-500 text-white font-bold py-3 rounded tracking-widest uppercase">GENERAR PIN DE ACCESO</button>
                                </form>
                            </div>

                            {/* SPONSORS GLOBALES */}
                            <div className="bg-black/40 p-6 rounded-xl border border-white/5 space-y-6">
                                <h2 className="text-xl font-bold tracking-widest uppercase border-b border-white/10 pb-2"><i className="fa-solid fa-images text-cyan-500"></i> Pantalla Sponsors Globales</h2>
                                <div className="bg-blue-900/20 border border-blue-500/30 p-3 rounded text-xs text-blue-200">
                                    <i className="fa-solid fa-circle-info"></i> <b>Tip Drive:</b> Si usas Google Drive, asegúrate que la imagen sea "Pública" y extrae el ID. El link debe ser: <br/><code className="text-pink-400">https://drive.google.com/uc?export=view&id=ID_AQUI</code>
                                </div>
                                <div className="flex gap-2">
                                    <input type="text" value={newLogoUrl} onChange={e=>setNewLogoUrl(e.target.value)} placeholder="URL de la imagen..." className="flex-1 bg-black/50 border border-white/20 rounded px-3" />
                                    <button onClick={addGlobalSponsor} className="bg-cyan-600 px-4 py-2 rounded font-bold hover:bg-cyan-500">AÑADIR</button>
                                </div>
                                <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar pr-2">
                                    {globalSponsors.map((url, idx) => (
                                        <div key={idx} className="flex justify-between items-center bg-white/5 p-2 rounded border border-white/5">
                                            <div className="flex items-center gap-3"><img src={url} className="h-8 w-12 object-contain bg-black/50 rounded" /><span className="text-[10px] text-gray-400 truncate w-40">{url}</span></div>
                                            <button onClick={() => removeGlobalSponsor(idx)} className="text-red-500 hover:text-red-400"><i className="fa-solid fa-trash"></i></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* LISTA DE CLIENTES ACTIVOS */}
                        <div className="bg-black/40 p-6 rounded-xl border border-white/5 space-y-4">
                            <h2 className="text-xl font-bold tracking-widest uppercase border-b border-white/10 pb-2"><i className="fa-solid fa-users text-indigo-500"></i> Licencias Activas</h2>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm text-gray-400">
                                    <thead className="text-xs text-white uppercase bg-white/5">
                                        <tr><th className="p-3">PIN</th><th className="p-3">Cliente</th><th className="p-3">Creado</th><th className="p-3">Vence</th><th className="p-3 text-center">Estado</th><th className="p-3 text-right">Acción</th></tr>
                                    </thead>
                                    <tbody>
                                        {tournaments.map(t => {
                                            const isExpired = Date.now() > t.expiresAt;
                                            return (
                                                <tr key={t.id} className="border-b border-white/5 hover:bg-white/5">
                                                    <td className="p-3 font-mono font-bold text-pink-400">{t.pin}</td>
                                                    <td className="p-3 text-white font-bold">{t.clientName}</td>
                                                    <td className="p-3">{new Date(t.createdAt).toLocaleDateString()}</td>
                                                    <td className="p-3">{new Date(t.expiresAt).toLocaleDateString()} {new Date(t.expiresAt).toLocaleTimeString()}</td>
                                                    <td className="p-3 text-center">{isExpired ? <span className="bg-red-500/20 text-red-500 px-2 py-1 rounded text-xs">VENCIDO</span> : <span className="bg-green-500/20 text-green-500 px-2 py-1 rounded text-xs">ACTIVO</span>}</td>
                                                    <td className="p-3 text-right">
                                                        {/* NUEVO BOTÓN: Espiar/Controlar torneo */}
                                                        <button onClick={() => window.open(`?pin=${t.pin}`, '_blank')} className="text-blue-400 hover:text-blue-300 mr-4" title="Entrar a controlar/ver torneo"><i className="fa-solid fa-eye"></i></button>
                                                        <button onClick={() => handleDelete(t.pin)} className="text-red-500 hover:text-white" title="Eliminar torneo"><i className="fa-solid fa-trash"></i></button>
                                                    </td>
                                                </tr>
                                            )
                                        })}
                                        {tournaments.length === 0 && <tr><td colSpan="6" className="text-center p-6 italic">No hay torneos registrados.</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
