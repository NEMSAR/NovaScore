<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaScore - Padel Scoreboard Pro</title>
    
    <link rel="icon" href="https://i.imgur.com/FnYqHyv.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Fuentes Premium para TV -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">

    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
            }
        }
    </script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        .font-tv-header { font-family: 'Oswald', sans-serif; }
        .font-tv-numbers { font-family: 'Montserrat', sans-serif; }

        @keyframes slideInRight { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        @keyframes tournamentPointPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(251,191,36,0.6)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(251,191,36,1)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(251,191,36,0.6)); }
        }
        .animate-tournament-point { animation: tournamentPointPulse 2s ease-in-out infinite; }

        /* Efecto de Brillo/Reflejo sobre el marcador */
        @keyframes sheen {
            0% { transform: translateX(-150%) rotate(25deg); }
            20% { transform: translateX(250%) rotate(25deg); }
            100% { transform: translateX(250%) rotate(25deg); }
        }
        .animate-sheen {
            position: absolute; top: -50%; left: -50%; width: 50%; height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
            animation: sheen 7s infinite;
            pointer-events: none;
            z-index: 10;
        }

        /* Animaciones para los Campeones */
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }
        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(251,191,36,1) 0%, rgba(251,191,36,0) 70%);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear { display: none; }
        
        body { margin: 0; overflow: hidden; background-color: #0a0a0c; touch-action: manipulation; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, deleteDoc } from 'firebase/firestore';

        // --- CONFIGURACIÓN DE FIREBASE ---
        let firebaseConfig = {
            apiKey: "AIzaSyC3zt607wskM2ax9fxVQM7qRrsMxvepjss",
            authDomain: "novascore-24ab5.firebaseapp.com",
            projectId: "novascore-24ab5",
            storageBucket: "novascore-24ab5.firebasestorage.app",
            messagingSenderId: "504663563166",
            appId: "1:504663563166:web:0fe795abfa02818d94948f"
        };
        
        try {
            if (typeof __firebase_config !== 'undefined') firebaseConfig = JSON.parse(__firebase_config);
        } catch(e) { console.warn("Usando config de Firebase por defecto."); }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'novabit-padel';

        // --- CONSTANTES GLOBALES ---
        const MASTER_PIN = 'NOVA2026';
        const POINTS = ['0', '15', '30', '40', 'Ad'];
        const THEMES = {
            pink: { name: 'MASTER (Rosa)', bg1: 'bg-pink-600', bg2: 'bg-indigo-600', text: 'text-pink-500', gradient: 'from-pink-500 to-indigo-500', border: 'border-pink-500', shadow: 'shadow-pink-500/20' },
            blue: { name: 'OPEN (Azul)', bg1: 'bg-cyan-500', bg2: 'bg-blue-700', text: 'text-cyan-400', gradient: 'from-cyan-400 to-blue-600', border: 'border-cyan-400', shadow: 'shadow-cyan-500/20' },
            gold: { name: 'FINALS (Dorado)', bg1: 'bg-yellow-500', bg2: 'bg-orange-700', text: 'text-yellow-400', gradient: 'from-yellow-400 to-orange-500', border: 'border-yellow-400', shadow: 'shadow-yellow-500/20' }
        };
        const TOURNAMENT_PHASES = ["Fase de Grupos", "Dieciseisavos", "Octavos", "Cuartos", "Semifinales", "Final"];
        const PLAYER_LEVELS = ["PRO", "1RA", "2DA", "3RA", "4TA", "5TA", "6TA", "7MA", "8VA", "SUMA 13"];
        
        const DEFAULT_GAME_STATE = {
            activeView: 'scoreboard',
            category: 'MASCULINO',
            playerLevel: '1RA',
            theme: 'pink',
            tournamentLogo: '', 
            tournamentPhase: 'Final', 
            courtName: 'PISTA CENTRAL',
            team1: { p1: 'JUGADOR 1', p2: 'JUGADOR 2', sets: [0, 0, 0], points: '0', tbPoints: 0 },
            team2: { p1: 'JUGADOR 3', p2: 'JUGADOR 4', sets: [0, 0, 0], points: '0', tbPoints: 0 },
            server: { team: 1, player: 1 },
            nextServerT1: 2,
            nextServerT2: 1,
            puntoDeOro: true,
            tieBreakMode: 0, // 0: Normal, 1: TieBreak (7), 2: Super TieBreak (10)
            currentSet: 0, 
            tvAlert: '',
            timeLeft: 300, isTimerRunning: false, matchClock: 0, isMatchClockRunning: false,
            sponsors: ["TORNEO PATROCINADO POR: RED BULL", "VISITA NUESTRO BAR PARA BEBIDAS FRÍAS"],
            tournamentBanners: [], 
            tournamentSponsors: [], 
            matchHistory: []
        };

        const BackgroundFX = ({ activeView, themeKey }) => {
            const theme = THEMES[themeKey] || THEMES.pink;
            return (
                <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
                    <div className={`absolute top-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full mix-blend-screen filter blur-[120px] opacity-40 animate-pulse transition-colors duration-1000 ${activeView === 'halftime' ? 'bg-indigo-900' : theme.bg1}`}></div>
                    <div className={`absolute bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] rounded-full mix-blend-screen filter blur-[100px] opacity-40 transition-colors duration-1000 ${activeView === 'halftime' ? 'bg-cyan-900' : theme.bg2}`}></div>
                    <div className="absolute top-[40%] left-[40%] w-[30vw] h-[30vw] bg-zinc-600 rounded-full mix-blend-screen filter blur-[150px] opacity-10"></div>
                    <div className="absolute inset-0 opacity-[0.03]" style={{ backgroundImage: 'radial-gradient(#fff 1px, transparent 1px)', backgroundSize: '30px 30px' }}></div>
                </div>
            );
        };

        function BannerCarousel({ banners, className }) {
            const [idx, setIdx] = useState(0);
            
            useEffect(() => {
                if (!banners || banners.length <= 1) return;
                const i = setInterval(() => setIdx(p => (p + 1) % banners.length), 6000);
                return () => clearInterval(i);
            }, [banners]);
            
            if (!banners || banners.length === 0) return null;
            
            return (
                <div className={`relative overflow-hidden flex items-center justify-center ${className}`}>
                    {banners.map((url, i) => (
                        <img 
                            key={i} 
                            src={url} 
                            onError={(e) => { e.target.onerror = null; e.target.src = 'https://i.imgur.com/FnYqHyv.png'; }}
                            className={`absolute w-full h-full object-contain transition-opacity duration-1000 ${i === idx ? 'opacity-100 z-10' : 'opacity-0 z-0'}`} 
                        />
                    ))}
                </div>
            );
        }

        const WinnerParticles = () => {
            const particles = Array.from({ length: 30 }).map((_, i) => ({
                id: i, left: `${Math.random() * 100}%`, width: `${Math.random() * 80 + 20}px`, height: `${Math.random() * 80 + 20}px`,
                animationDuration: `${Math.random() * 3 + 2}s`, animationDelay: `${Math.random() * 2}s`
            }));
            return (
                <div className="absolute inset-0 z-0 overflow-hidden pointer-events-none">
                    {particles.map(p => (
                        <div key={p.id} className="particle" style={{ left: p.left, width: p.width, height: p.height, animationDuration: p.animationDuration, animationDelay: p.animationDelay }}></div>
                    ))}
                </div>
            );
        };

        const calculateAutoAlert = (state) => {
            const { team1, team2, currentSet, tieBreakMode, tournamentPhase } = state;
            const is1PtAway = (pts, oppPts, tbPts, oppTbPts) => {
                if (tieBreakMode > 0) {
                    const target = tieBreakMode === 2 ? 10 : 7;
                    return tbPts >= target - 1 && (tbPts - oppTbPts >= 1);
                }
                if (pts === '40' && oppPts === '40' && state.puntoDeOro) return true; 
                return (pts === '40' && oppPts !== 'Ad' && oppPts !== '40') || pts === 'Ad';
            };
            const is1GameAway = (games, oppGames) => {
                if (tieBreakMode > 0) return true; 
                return (games === 5 && oppGames <= 4) || (games === 6 && oppGames === 5);
            };

            const t1GamePt = is1PtAway(team1.points, team2.points, team1.tbPoints, team2.tbPoints);
            const t2GamePt = is1PtAway(team2.points, team1.points, team2.tbPoints, team1.tbPoints);
            const t1SetPt = t1GamePt && is1GameAway(team1.sets[currentSet], team2.sets[currentSet]);
            const t2SetPt = t2GamePt && is1GameAway(team2.sets[currentSet], team1.sets[currentSet]);

            let setsW1 = 0, setsW2 = 0;
            for(let i=0; i<3; i++) {
                if (i === currentSet) continue;
                if (team1.sets[i] >= 6 && team1.sets[i] > team2.sets[i]) setsW1++;
                if (team2.sets[i] >= 6 && team2.sets[i] > team1.sets[i]) setsW2++;
            }
            const t1MatchPt = t1SetPt && setsW1 === 1;
            const t2MatchPt = t2SetPt && setsW2 === 1;

            if (t1MatchPt || t2MatchPt) return tournamentPhase === 'Final' ? 'TOURNAMENT POINT' : 'MATCH POINT';
            if (t1SetPt || t2SetPt) return 'SET POINT';
            if (tieBreakMode === 0 && team1.points === '40' && team2.points === '40') return 'PUNTO DE ORO';
            return '';
        };

        const checkMatchEnd = (state) => {
            let w1 = 0, w2 = 0;
            for(let i=0; i<3; i++) {
                if (state.team1.sets[i] >= 6 && state.team1.sets[i] > state.team2.sets[i]) w1++;
                if (state.team2.sets[i] >= 6 && state.team2.sets[i] > state.team1.sets[i]) w2++;
            }
            return w1 >= 2 ? 1 : (w2 >= 2 ? 2 : 0);
        };

        function App() {
            const bc = useRef(null);
            const [user, setUser] = useState(null);
            const [authMode, setAuthMode] = useState('login');
            const [pinInput, setPinInput] = useState('');
            const [authError, setAuthError] = useState('');
            
            const [activePin, setActivePin] = useState(null); 
            const [activeSpectatorId, setActiveSpectatorId] = useState(null); 
            
            const [gameState, setGameState] = useState(DEFAULT_GAME_STATE);
            const gameStateRef = useRef(gameState);
            
            const [globalSponsors, setGlobalSponsors] = useState([]);
            const [tournamentBanners, setTournamentBanners] = useState([]);
            const [tournamentSponsors, setTournamentSponsors] = useState([]);

            const [showControls, setShowControls] = useState(false);
            
            const initialIsPublic = !!new URLSearchParams(window.location.search).get('view');
            const [isPublicMode, setIsPublicMode] = useState(initialIsPublic);
            
            const [currentSponsorIdx, setCurrentSponsorIdx] = useState(0);
            const [currentLogoIdx, setCurrentLogoIdx] = useState(0);
            const [newTickerMsg, setNewTickerMsg] = useState('');

            useEffect(() => {
                gameStateRef.current = gameState;
            }, [gameState]);

            useEffect(() => {
                const block = (e) => { if(e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) e.preventDefault(); };
                window.addEventListener('contextmenu', e => e.preventDefault());
                window.addEventListener('keydown', block);
                return () => { window.removeEventListener('contextmenu', e => e.preventDefault()); window.removeEventListener('keydown', block); };
            }, []);

            useEffect(() => {
                const initAuth = async () => { try { await signInAnonymously(auth); } catch (e) { console.error("Error Auth:", e); } };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    try {
                        const urlParams = new URLSearchParams(window.location.search);
                        const viewId = urlParams.get('view');
                        if (viewId && u) checkSpectator(viewId);
                    } catch (e) { console.error("Error validando la URL", e); }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'globalSponsors', 'main'), (docSnap) => {
                    if (docSnap.exists()) setGlobalSponsors(docSnap.data().logos || []);
                });
                return () => unsub();
            }, [user]);

            const checkSpectator = async (viewId) => {
                try {
                    const docSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scoreboards', viewId));
                    if (docSnap.exists()) {
                        if (Date.now() > docSnap.data().expiresAt) {
                            setAuthError("Este partido ha finalizado o caducado.");
                        } else {
                            setActiveSpectatorId(viewId);
                            setIsPublicMode(true);
                            setAuthMode('scoreboard');
                        }
                    } else {
                        setAuthError("Enlace público inválido.");
                    }
                } catch (e) { setAuthError("Error de conexión."); }
            };

            const validateAndLoadTournament = async (pinStr) => {
                if (!user) return;
                if (pinStr === MASTER_PIN) { setAuthMode('admin_cms'); return; }
                try {
                    const docSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', pinStr));
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (Date.now() > data.expiresAt) {
                            setAuthError("Este código ha caducado.");
                        } else { 
                            setActivePin(pinStr); 
                            setActiveSpectatorId(data.spectatorId); 
                            setAuthMode('scoreboard'); 
                        }
                    } else setAuthError("PIN Inválido o torneo no encontrado.");
                } catch (error) { setAuthError("Error de conexión al verificar el PIN."); }
            };

            const handleLoginSubmit = (e) => { 
                e.preventDefault(); 
                setAuthError(''); 
                validateAndLoadTournament(pinInput); 
            };

            const handleLogout = () => {
                setAuthMode('login');
                setPinInput('');
                setActivePin(null);
                setActiveSpectatorId(null);
                setIsPublicMode(false);
                setShowControls(false);
                window.location.href = window.location.pathname;
            };

            useEffect(() => {
                if (!user || authMode !== 'scoreboard' || !activeSpectatorId) return;
                const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'scoreboards', activeSpectatorId), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        const fixedState = { ...DEFAULT_GAME_STATE, ...data.gameState };
                        if(typeof fixedState.server !== 'object') fixedState.server = { team: fixedState.server || 1, player: 1 };
                        setGameState(fixedState);
                        setTournamentBanners(data.tournamentBanners || []);
                        setTournamentSponsors(data.tournamentSponsors || []);
                    }
                });
                return () => unsub();
            }, [user, authMode, activeSpectatorId]);

            useEffect(() => {
                let intervalId = null;
                if (authMode === 'scoreboard' && !isPublicMode && activePin && (gameState.isTimerRunning || gameState.isMatchClockRunning)) {
                    intervalId = setInterval(() => {
                        const currentState = gameStateRef.current; 
                        let updates = {};
                        if (currentState.isTimerRunning && currentState.timeLeft > 0) updates.timeLeft = currentState.timeLeft - 1;
                        else if (currentState.isTimerRunning && currentState.timeLeft <= 0) updates.isTimerRunning = false;
                        if (currentState.isMatchClockRunning) updates.matchClock = currentState.matchClock + 1;
                        if (Object.keys(updates).length > 0) pushUpdate(updates);
                    }, 1000);
                }
                return () => clearInterval(intervalId);
            }, [gameState.isTimerRunning, gameState.isMatchClockRunning, authMode, isPublicMode, activePin]);

            useEffect(() => {
                if (gameState.sponsors?.length > 0) {
                    const i = setInterval(() => setCurrentSponsorIdx(p => (p + 1) % gameState.sponsors.length), 5000);
                    return () => clearInterval(i);
                }
            }, [gameState.sponsors?.length]);

            const allFullSponsors = [...globalSponsors, ...tournamentSponsors];
            useEffect(() => {
                if (gameState.activeView === 'sponsor_full' && allFullSponsors.length > 0) {
                    const i = setInterval(() => setCurrentLogoIdx(p => (p + 1) % allFullSponsors.length), 4000);
                    return () => clearInterval(i);
                }
            }, [gameState.activeView, allFullSponsors.length]);

            const pushUpdate = async (updates) => {
                if (!activePin || isPublicMode) return;
                const currentState = gameStateRef.current;
                const tempState = { ...currentState, ...updates };
                
                if (updates.team1 || updates.team2 || updates.tieBreakMode !== undefined || updates.currentSet !== undefined) {
                    const autoAlert = calculateAutoAlert(tempState);
                    tempState.tvAlert = autoAlert; 
                }
                
                setGameState(tempState);
                try { 
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scoreboards', activeSpectatorId), { gameState: tempState }); 
                } catch (e) { }
            };

            const triggerWinnerCheck = (newState) => {
                if (checkMatchEnd(newState) > 0) {
                    setTimeout(() => {
                        if (gameStateRef.current.activeView === 'scoreboard') {
                            pushUpdate({ activeView: 'winner' });
                        }
                    }, 3000);
                }
            };

            // LOGICA DE ALTERNANCIA DE SAQUE
            const advanceServer = (currentState) => {
                const currentSrvTeam = currentState.server?.team || 1;
                const currentSrvPlayer = currentState.server?.player || 1;
                
                const newSrvTeam = currentSrvTeam === 1 ? 2 : 1;
                const newSrvPlayer = newSrvTeam === 1 ? (currentState.nextServerT1 || 1) : (currentState.nextServerT2 || 1);

                const nextUpdates = {};
                if (currentSrvTeam === 1) nextUpdates.nextServerT1 = currentSrvPlayer === 1 ? 2 : 1;
                else nextUpdates.nextServerT2 = currentSrvPlayer === 1 ? 2 : 1;

                return { server: { team: newSrvTeam, player: newSrvPlayer }, ...nextUpdates };
            };

            const autoWinGame = (teamNum, direction = 'up') => {
                const currentState = gameStateRef.current;
                const teamKey = teamNum === 1 ? 'team1' : 'team2';
                const team = currentState[teamKey];
                let newSets = [...team.sets];

                if (direction === 'up' && newSets[currentState.currentSet] < 7) {
                    newSets[currentState.currentSet]++;
                } else if (direction === 'down' && newSets[currentState.currentSet] > 0) {
                    newSets[currentState.currentSet]--;
                }

                let srvUpdates = {};
                if (direction === 'up') srvUpdates = advanceServer(currentState);

                const newTempState = {
                    ...currentState,
                    [teamKey]: { ...team, sets: newSets, points: '0', tbPoints: 0 },
                    [teamNum === 1 ? 'team2' : 'team1']: { ...currentState[teamNum === 1 ? 'team2' : 'team1'], points: '0', tbPoints: 0 },
                    ...srvUpdates
                };

                pushUpdate(newTempState);
                if (direction === 'up') triggerWinnerCheck(newTempState);
            };

            const handlePoints = (teamNum, direction) => {
                const currentState = gameStateRef.current;
                const teamKey = teamNum === 1 ? 'team1' : 'team2';
                const otherTeamKey = teamNum === 1 ? 'team2' : 'team1';
                const team = currentState[teamKey];
                const otherTeam = currentState[otherTeamKey];

                if (currentState.tieBreakMode > 0) {
                    let newTb = team.tbPoints;
                    let updates = {};

                    if (direction === 'up') {
                        newTb++;
                        const target = currentState.tieBreakMode === 2 ? 10 : 7;
                        
                        if (newTb >= target && (newTb - otherTeam.tbPoints >= 2)) {
                            // Gana TieBreak y Game
                            autoWinGame(teamNum, 'up');
                            pushUpdate({ tieBreakMode: 0, tvAlert: '' });
                            return;
                        }

                        const totalPoints = newTb + otherTeam.tbPoints;
                        if (totalPoints % 2 !== 0) {
                            updates = advanceServer(currentState);
                        }
                    } else {
                        if (newTb > 0) newTb--;
                    }
                    pushUpdate({ ...updates, [teamKey]: { ...team, tbPoints: newTb } });
                } else {
                    if (direction === 'up') {
                        if (team.points === '40') {
                            if (currentState.puntoDeOro) {
                                autoWinGame(teamNum);
                            } else {
                                if (otherTeam.points === '40') {
                                    pushUpdate({ [teamKey]: { ...team, points: 'Ad' } });
                                } else if (otherTeam.points === 'Ad') {
                                    pushUpdate({ [otherTeamKey]: { ...otherTeam, points: '40' } });
                                } else {
                                    autoWinGame(teamNum);
                                }
                            }
                        } else if (team.points === 'Ad') {
                            autoWinGame(teamNum);
                        } else {
                            const curr = POINTS.indexOf(team.points);
                            pushUpdate({ [teamKey]: { ...team, points: POINTS[curr + 1] } });
                        }
                    } else {
                        if (team.points === 'Ad') {
                            pushUpdate({ [teamKey]: { ...team, points: '40' } });
                        } else {
                            const curr = POINTS.indexOf(team.points);
                            if (curr > 0) {
                                pushUpdate({ [teamKey]: { ...team, points: POINTS[curr - 1] } });
                            }
                        }
                    }
                }
            };

            const resetPoints = (teamNum) => {
                const currentState = gameStateRef.current;
                const teamKey = teamNum === 1 ? 'team1' : 'team2';
                const team = currentState[teamKey];
                pushUpdate({ [teamKey]: { ...team, points: '0', tbPoints: 0 } });
            };

            const resetGames = (teamNum) => {
                const currentState = gameStateRef.current;
                const teamKey = teamNum === 1 ? 'team1' : 'team2';
                const team = currentState[teamKey];
                let newSets = [...team.sets];
                newSets[currentState.currentSet] = 0;
                pushUpdate({ [teamKey]: { ...team, sets: newSets } });
            };

            const addTickerMessage = () => {
                const currentState = gameStateRef.current;
                if(!newTickerMsg.trim()) return;
                pushUpdate({ sponsors: [...(currentState.sponsors || []), newTickerMsg.trim()] });
                setNewTickerMsg('');
            };

            const removeTickerMessage = (idx) => {

        // --- COMPONENTE CMS (PANEL MAESTRO DE AGENCIA) ---
        function AdminCMS({ db, user, appId, handleLogout, globalSponsors }) {
            const [tournaments, setTournaments] = useState([]);
            const [clientName, setClientName] = useState('');
            const [daysValid, setDaysValid] = useState(1);
            const [customLogo, setCustomLogo] = useState('');
            const [newLogoUrl, setNewLogoUrl] = useState('');
            const [lastGeneratedPin, setLastGeneratedPin] = useState(null);
            
            const [editingTournament, setEditingTournament] = useState(null);
            const [editBanners, setEditBanners] = useState('');
            const [editSponsors, setEditSponsors] = useState('');

            useEffect(() => {
                const unsub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'tournaments'), (snap) => {
                    const list = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    setTournaments(list);
                });
                return () => unsub();
            }, []);

            const generatePin = () => Math.floor(100000 + Math.random() * 900000).toString();

            const handleCreateTournament = async (e) => {
                e.preventDefault();
                if(!clientName) return;
                const operatorPin = generatePin();
                const spectatorId = "V" + Math.floor(10000000 + Math.random() * 90000000).toString();
                const expiresAt = Date.now() + (daysValid * 24 * 60 * 60 * 1000); 
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', operatorPin), { pin: operatorPin, spectatorId, clientName, expiresAt, createdAt: Date.now() });
                    const initialState = { ...DEFAULT_GAME_STATE, tournamentLogo: customLogo };
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scoreboards', spectatorId), { gameState: initialState, expiresAt });
                    setLastGeneratedPin({ pin: operatorPin, spectatorId, clientName });
                    setClientName(''); setCustomLogo(''); 
                    setTimeout(() => setLastGeneratedPin(null), 20000);
                } catch(e) { console.error("Error creando:", e); }
            };

            const handleDelete = async (pin, spectatorId) => {
                if(!window.confirm('¿Borrar este torneo?')) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', pin));
                if(spectatorId) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scoreboards', spectatorId));
            };

            const addGlobalSponsor = async () => {
                if(!newLogoUrl) return;
                const updated = [...globalSponsors, newLogoUrl];
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'globalSponsors', 'main'), { logos: updated });
                setNewLogoUrl('');
            };

            const removeGlobalSponsor = async (idx) => {
                const updated = [...globalSponsors];
                updated.splice(idx, 1);
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'globalSponsors', 'main'), { logos: updated });
            };

            // FUNCIONES DE EDICIÓN PER-TORNEO
            const openEditAdvertising = async (t) => {
                try {
                    const targetId = t.spectatorId || t.pin;
                    const docSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scoreboards', targetId));
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setEditBanners(data.tournamentBanners?.join('\n') || '');
                        setEditSponsors(data.tournamentSponsors?.join('\n') || '');
                        setEditingTournament(t);
                    } else {
                        alert("No se pudo cargar la info del torneo.");
                    }
                } catch(e) { console.error("Error cargando torneo", e); }
            };

            const processUrls = (text) => {
                if (!text) return [];
                return text.split('\n').map(u => u.trim()).filter(u => u).map(u => {
                    const driveMatch = u.match(/[-\w]{25,}/);
                    if (u.includes('drive.google.com') && driveMatch) {
                        return `https://drive.google.com/uc?export=view&id=${driveMatch[0]}`;
                    }
                    return u;
                });
            };

            const saveAdvertising = async () => {
                if (!editingTournament) return;
                try {
                    const targetId = editingTournament.spectatorId || editingTournament.pin;
                    const processedBanners = processUrls(editBanners);
                    const processedSponsors = processUrls(editSponsors);

                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scoreboards', targetId), {
                        tournamentBanners: processedBanners,
                        tournamentSponsors: processedSponsors
                    });
                    setEditingTournament(null);
                    alert("Publicidad del torneo actualizada con éxito.");
                } catch (e) { console.error("Error actualizando publicidad", e); }
            };

            if (editingTournament) {
                return (
                    <div className="h-screen overflow-y-auto custom-scrollbar bg-gray-900 text-white p-8 font-sans">
                        <div className="max-w-4xl mx-auto space-y-6">
                            <div className="flex justify-between items-center border-b border-white/10 pb-4">
                                <div>
                                    <h1 className="text-2xl font-tv-header tracking-widest text-indigo-400 uppercase">Gestionar Publicidad</h1>
                                    <p className="text-gray-400 text-xs tracking-[0.2em] font-tv-header">CLIENTE: {editingTournament.clientName} | PIN: {editingTournament.pin}</p>
                                </div>
                                <button onClick={() => setEditingTournament(null)} className="bg-white/10 hover:bg-white/20 px-4 py-2 rounded font-bold text-xs"><i className="fa-solid fa-arrow-left"></i> VOLVER AL CMS</button>
                            </div>

                            <div className="bg-blue-900/20 border border-blue-500/30 p-4 rounded text-xs text-blue-200">
                                <i className="fa-solid fa-circle-info text-lg mb-2"></i><br/>
                                <b>Importación Mágica desde Google Drive:</b> Selecciona todas las imágenes en tu carpeta de Google Drive, haz clic en "Obtener enlaces" y pégalos directamente en las cajas de texto de abajo (uno por línea). El sistema los convertirá automáticamente.<br/><br/>
                                <span className="text-pink-300"><b>NOTA IMPORTANTE:</b> Si Google Drive bloquea las imágenes o no se muestran, recomendamos subir tus banners a <b>postimages.org</b> o <b>imgur.com</b> y pegar aquí el 'Enlace directo' (.jpg o .png).</span>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-black/40 p-6 rounded-xl border border-white/5 space-y-4">
                                    <h2 className="text-sm font-tv-header tracking-widest uppercase border-b border-white/10 pb-2 text-pink-400"><i className="fa-regular fa-images"></i> Banners (Scoreboard/Descanso)</h2>
                                    <p className="text-[10px] text-gray-500">Pega los enlaces aquí (uno por línea):</p>
                                    <textarea 
                                        value={editBanners} 
                                        onChange={e => setEditBanners(e.target.value)} 
                                        className="w-full h-48 bg-black/50 border border-white/20 rounded p-2 text-xs custom-scrollbar whitespace-nowrap overflow-x-auto"
                                        placeholder="https://drive.google.com/file/d/ID1/view&#10;https://drive.google.com/file/d/ID2/view"
                                    />
                                </div>

                                <div className="bg-black/40 p-6 rounded-xl border border-white/5 space-y-4">
                                    <h2 className="text-sm font-tv-header tracking-widest uppercase border-b border-white/10 pb-2 text-cyan-400"><i className="fa-solid fa-expand"></i> Sponsors Pantalla Completa</h2>
                                    <p className="text-[10px] text-gray-500">Pega los enlaces aquí (uno por línea):</p>
                                    <textarea 
                                        value={editSponsors} 
                                        onChange={e => setEditSponsors(e.target.value)} 
                                        className="w-full h-48 bg-black/50 border border-white/20 rounded p-2 text-xs custom-scrollbar whitespace-nowrap overflow-x-auto"
                                        placeholder="https://drive.google.com/file/d/ID3/view&#10;https://drive.google.com/file/d/ID4/view"
                                    />
                                </div>
                            </div>
                            <button onClick={saveAdvertising} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded tracking-widest uppercase font-tv-header text-lg shadow-lg transition-transform hover:scale-[1.01]">GUARDAR PUBLICIDAD DEL TORNEO</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen overflow-y-auto custom-scrollbar bg-gray-900 text-white p-8 font-sans">
                    <div className="max-w-6xl mx-auto space-y-8">
                        <div className="flex justify-between items-center border-b border-white/10 pb-4">
                            <div className="flex items-center gap-4">
                                <img src="https://i.imgur.com/FnYqHyv.png" className="h-10" />
                                <div><h1 className="text-2xl font-tv-header tracking-widest text-pink-500 uppercase">NovaBit CMS Master</h1><p className="text-gray-400 text-xs tracking-[0.2em] font-tv-header">PANEL DE GESTIÓN DE SERVICIOS</p></div>
                            </div>
                            <button onClick={handleLogout} className="bg-white/10 hover:bg-red-500 hover:text-white transition-colors px-4 py-2 rounded font-bold text-xs"><i className="fa-solid fa-power-off"></i> CERRAR SESIÓN</button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="bg-black/40 p-6 rounded-xl border border-white/5 space-y-6">
                                <h2 className="text-xl font-tv-header tracking-widest uppercase border-b border-white/10 pb-2"><i className="fa-solid fa-key text-pink-500"></i> Generar Licencia</h2>
                                <form onSubmit={handleCreateTournament} className="space-y-4">
                                    <div><label className="text-xs text-gray-400 font-bold">NOMBRE DEL CLIENTE/TORNEO</label><input type="text" value={clientName} onChange={e=>setClientName(e.target.value)} className="w-full bg-black/50 border border-white/20 rounded p-3 text-white mt-1 font-tv-header" required/></div>
                                    <div><label className="text-xs text-gray-400 font-bold">LOGO DEL TORNEO (URL OPCIONAL)</label><input type="text" value={customLogo} onChange={e=>setCustomLogo(e.target.value)} placeholder="https://..." className="w-full bg-black/50 border border-white/20 rounded p-3 text-white mt-1"/></div>
                                    <div>
                                        <label className="text-xs text-gray-400 font-bold">DURACIÓN DEL SERVICIO</label>
                                        <select value={daysValid} onChange={e=>setDaysValid(Number(e.target.value))} className="w-full bg-black/50 border border-white/20 rounded p-3 text-white mt-1">
                                            <option value={1}>1 Día (Prueba / Express)</option><option value={3}>3 Días (Fin de Semana)</option><option value={7}>7 Días (Semana Completa)</option><option value={30}>30 Días (Mensual)</option>
                                        </select>
                                    </div>
                                    <button type="submit" className="w-full bg-pink-600 hover:bg-pink-500 text-white font-bold py-3 rounded tracking-widest uppercase font-tv-header text-lg">GENERAR PIN DE ACCESO</button>
                                </form>

                                {lastGeneratedPin && (
                                    <div className="mt-4 bg-green-500/10 border border-green-500/30 rounded-lg p-4 text-center animate-pulse">
                                        <div className="text-green-400 text-xs font-bold tracking-widest uppercase mb-2"><i className="fa-solid fa-circle-check"></i> Licencia Generada Exitosamente</div>
                                        <div className="text-gray-300 text-sm font-bold uppercase font-tv-header">{lastGeneratedPin.clientName}</div>
                                        <div className="text-5xl font-tv-numbers font-black text-white tracking-widest py-3">{lastGeneratedPin.pin}</div>
                                        <div className="text-[10px] text-gray-400 uppercase tracking-widest">PIN PARA OPERADOR</div>
                                        <div className="mt-2 p-2 bg-black/40 rounded text-[9px] text-gray-300 break-all border border-white/10">
                                            LINK PÚBLICO (No requiere PIN):<br/>
                                            <a href={`?view=${lastGeneratedPin.spectatorId}`} target="_blank" className="text-blue-400 hover:underline">{window.location.origin}{window.location.pathname}?view={lastGeneratedPin.spectatorId}</a>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="bg-black/40 p-6 rounded-xl border border-white/5 space-y-6">
                                <h2 className="text-xl font-tv-header tracking-widest uppercase border-b border-white/10 pb-2"><i className="fa-solid fa-images text-cyan-500"></i> Pantalla Sponsors Globales</h2>
                                <div className="flex gap-2">
                                    <input type="text" value={newLogoUrl} onChange={e=>setNewLogoUrl(e.target.value)} placeholder="URL de la imagen..." className="flex-1 bg-black/50 border border-white/20 rounded px-3" />
                                    <button onClick={addGlobalSponsor} className="bg-cyan-600 px-4 py-2 rounded font-bold hover:bg-cyan-500">AÑADIR</button>
                                </div>
                                <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar pr-2">
                                    {globalSponsors.map((url, idx) => (
                                        <div key={idx} className="flex justify-between items-center bg-white/5 p-2 rounded border border-white/5">
                                            <div className="flex items-center gap-3"><img src={url} className="h-8 w-12 object-contain bg-black/50 rounded" /><span className="text-[10px] text-gray-400 truncate w-40">{url}</span></div>
                                            <button onClick={() => removeGlobalSponsor(idx)} className="text-red-500 hover:text-red-400"><i className="fa-solid fa-trash"></i></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="bg-black/40 p-6 rounded-xl border border-white/5 space-y-4">
                            <h2 className="text-xl font-tv-header tracking-widest uppercase border-b border-white/10 pb-2"><i className="fa-solid fa-users text-indigo-500"></i> Licencias Activas</h2>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm text-gray-400">
                                    <thead className="text-xs text-white uppercase bg-white/5 font-tv-header tracking-widest">
                                        <tr><th className="p-3">PIN</th><th className="p-3">Cliente</th><th className="p-3">Creado</th><th className="p-3">Vence</th><th className="p-3 text-center">Estado</th><th className="p-3 text-right">Gestión</th></tr>
                                    </thead>
                                    <tbody>
                                        {tournaments.map(t => {
                                            const isExpired = Date.now() > t.expiresAt;
                                            return (
                                                <tr key={t.id} className="border-b border-white/5 hover:bg-white/5">
                                                    <td className="p-3 font-tv-numbers font-bold text-pink-400">{t.pin}</td>
                                                    <td className="p-3 text-white font-bold">{t.clientName}</td>
                                                    <td className="p-3">{new Date(t.createdAt).toLocaleDateString()}</td>
                                                    <td className="p-3">{new Date(t.expiresAt).toLocaleDateString()}</td>
                                                    <td className="p-3 text-center">{isExpired ? <span className="bg-red-500/20 text-red-500 px-2 py-1 rounded text-xs font-bold">VENCIDO</span> : <span className="bg-green-500/20 text-green-500 px-2 py-1 rounded text-xs font-bold">ACTIVO</span>}</td>
                                                    <td className="p-3 text-right flex justify-end gap-3 items-center">
                                                        <button onClick={() => openEditAdvertising(t)} className="text-indigo-400 hover:text-indigo-300" title="Editar Publicidad y Banners"><i className="fa-solid fa-gear"></i> Editar Publicidad</button>
                                                        <button onClick={() => window.open(`?view=${t.spectatorId}`, '_blank')} className="text-blue-400 hover:text-blue-300" title="Entrar a ver torneo (Modo Público)"><i className="fa-solid fa-eye"></i></button>
                                                        <button onClick={() => handleDelete(t.pin, t.spectatorId)} className="text-red-500 hover:text-white" title="Eliminar torneo"><i className="fa-solid fa-trash"></i></button>
                                                    </td>
                                                </tr>
                                            )
                                        })}
                                        {tournaments.length === 0 && <tr><td colSpan="6" className="text-center p-6 italic">No hay torneos registrados.</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
