<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaScore - Padel Scoreboard Pro</title>
    
    <link rel="icon" href="https://i.imgur.com/FnYqHyv.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Fuentes Premium para TV -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">

    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
            }
        }
    </script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        
        .font-tv-header { font-family: 'Oswald', sans-serif; }
        .font-tv-numbers { font-family: 'Montserrat', sans-serif; }

        @keyframes slideInRight { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        @keyframes tournamentPointPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(251,191,36,0.6)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(251,191,36,1)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(251,191,36,0.6)); }
        }
        .animate-tournament-point { animation: tournamentPointPulse 2s ease-in-out infinite; }

        /* Efecto de Brillo/Reflejo sobre el marcador */
        @keyframes sheen {
            0% { transform: translateX(-150%) rotate(25deg); }
            20% { transform: translateX(250%) rotate(25deg); }
            100% { transform: translateX(250%) rotate(25deg); }
        }
        .animate-sheen {
            position: absolute; top: -50%; left: -50%; width: 50%; height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
            animation: sheen 7s infinite;
            pointer-events: none;
            z-index: 10;
        }

        body { margin: 0; overflow: hidden; background-color: #0a0a0c; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, onSnapshot, deleteDoc } from 'firebase/firestore';

        // --- CONFIGURACIÓN DE FIREBASE ---
        let firebaseConfig = {
            apiKey: "AIzaSyC3zt607wskM2ax9fxVQM7qRrsMxvepjss",
  authDomain: "novascore-24ab5.firebaseapp.com",
  projectId: "novascore-24ab5",
  storageBucket: "novascore-24ab5.firebasestorage.app",
  messagingSenderId: "504663563166",
  appId: "1:504663563166:web:0fe795abfa02818d94948f"
        };
        
        try {
            if (typeof __firebase_config !== 'undefined') firebaseConfig = JSON.parse(__firebase_config);
        } catch(e) { console.warn("Usando config de Firebase por defecto."); }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'novabit-padel';

        // --- CONSTANTES GLOBALES ---
        const MASTER_PIN = 'NOVA2026';
        const POINTS = ['0', '15', '30', '40', 'Ad'];
        const THEMES = {
            pink: { name: 'MASTER (Rosa)', bg1: 'bg-pink-600', bg2: 'bg-indigo-600', text: 'text-pink-500', gradient: 'from-pink-500 to-indigo-500', border: 'border-pink-500', shadow: 'shadow-pink-500/20' },
            blue: { name: 'OPEN (Azul)', bg1: 'bg-cyan-500', bg2: 'bg-blue-700', text: 'text-cyan-400', gradient: 'from-cyan-400 to-blue-600', border: 'border-cyan-400', shadow: 'shadow-cyan-500/20' },
            gold: { name: 'FINALS (Dorado)', bg1: 'bg-yellow-500', bg2: 'bg-orange-700', text: 'text-yellow-400', gradient: 'from-yellow-400 to-orange-500', border: 'border-yellow-400', shadow: 'shadow-yellow-500/20' }
        };
        const TOURNAMENT_PHASES = ["Fase de Grupos", "Dieciseisavos", "Octavos", "Cuartos", "Semifinales", "Final"];
        
        const DEFAULT_GAME_STATE = {
            activeView: 'scoreboard',
            category: 'MASCULINO',
            theme: 'pink',
            tournamentLogo: '', 
            tournamentPhase: 'Final', 
            courtName: 'PISTA CENTRAL',
            team1: { p1: 'JUGADOR 1', p2: 'JUGADOR 2', sets: [0, 0, 0], points: '0', tbPoints: 0 },
            team2: { p1: 'JUGADOR 3', p2: 'JUGADOR 4', sets: [0, 0, 0], points: '0', tbPoints: 0 },
            server: 1, currentSet: 0, isTieBreak: false, tvAlert: '',
            timeLeft: 300, isTimerRunning: false, matchClock: 0, isMatchClockRunning: false,
            sponsors: ["TORNEO PATROCINADO POR: RED BULL", "VISITA NUESTRO BAR PARA BEBIDAS FRÍAS"],
            matchHistory: []
        };

        const BackgroundFX = ({ activeView, themeKey }) => {
            const theme = THEMES[themeKey] || THEMES.pink;
            return (
                <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
                    <div className={`absolute top-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full mix-blend-screen filter blur-[120px] opacity-40 animate-pulse transition-colors duration-1000 ${activeView === 'halftime' ? 'bg-indigo-900' : theme.bg1}`}></div>
                    <div className={`absolute bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] rounded-full mix-blend-screen filter blur-[100px] opacity-40 transition-colors duration-1000 ${activeView === 'halftime' ? 'bg-cyan-900' : theme.bg2}`}></div>
                    <div className="absolute top-[40%] left-[40%] w-[30vw] h-[30vw] bg-purple-600 rounded-full mix-blend-screen filter blur-[150px] opacity-10"></div>
                    <div className="absolute inset-0 opacity-[0.03]" style={{ backgroundImage: 'radial-gradient(#fff 1px, transparent 1px)', backgroundSize: '30px 30px' }}></div>
                </div>
            );
        };

        // --- CEREBRO INTELIGENTE DE ALERTAS (AUTO-DETECT) ---
        const calculateAutoAlert = (state) => {
            const { team1, team2, currentSet, isTieBreak, tournamentPhase } = state;
            
            const is1PtAway = (pts, oppPts, tbPts, oppTbPts) => {
                if (isTieBreak) return tbPts >= 6 && (tbPts - oppTbPts >= 1);
                if (pts === '40' && oppPts === '40') return true; 
                return (pts === '40' && oppPts !== 'Ad' && oppPts !== '40') || pts === 'Ad';
            };

            const is1GameAway = (games, oppGames) => {
                if (isTieBreak) return true; 
                return (games === 5 && oppGames <= 4) || (games === 6 && oppGames === 5);
            };

            const t1GamePt = is1PtAway(team1.points, team2.points, team1.tbPoints, team2.tbPoints);
            const t2GamePt = is1PtAway(team2.points, team1.points, team2.tbPoints, team1.tbPoints);

            const t1SetPt = t1GamePt && is1GameAway(team1.sets[currentSet], team2.sets[currentSet]);
            const t2SetPt = t2GamePt && is1GameAway(team2.sets[currentSet], team1.sets[currentSet]);

            let setsW1 = 0, setsW2 = 0;
            for(let i=0; i<3; i++) {
                if (i === currentSet) continue;
                if (team1.sets[i] >= 6 && team1.sets[i] > team2.sets[i]) setsW1++;
                if (team2.sets[i] >= 6 && team2.sets[i] > team1.sets[i]) setsW2++;
            }

            const t1MatchPt = t1SetPt && setsW1 === 1;
            const t2MatchPt = t2SetPt && setsW2 === 1;

            if (t1MatchPt || t2MatchPt) return tournamentPhase === 'Final' ? 'TOURNAMENT POINT' : 'MATCH POINT';
            if (t1SetPt || t2SetPt) return 'SET POINT';
            if (!isTieBreak && team1.points === '40' && team2.points === '40') return 'PUNTO DE ORO';
            
            return '';
        };

        function App() {
            const bc = useRef(null);
            const [user, setUser] = useState(null);
            const [authMode, setAuthMode] = useState('login');
            const [pinInput, setPinInput] = useState('');
            const [authError, setAuthError] = useState('');
            const [activePin, setActivePin] = useState(null);
            
            const [gameState, setGameState] = useState(DEFAULT_GAME_STATE);
            
            const gameStateRef = useRef(gameState);
            
            const [globalSponsors, setGlobalSponsors] = useState([]);
            const [showControls, setShowControls] = useState(false);
            const [isPublicMode, setIsPublicMode] = useState(false);
            const [currentSponsorIdx, setCurrentSponsorIdx] = useState(0);
            const [currentLogoIdx, setCurrentLogoIdx] = useState(0);
            const [newTickerMsg, setNewTickerMsg] = useState('');

            // Mantenemos la referencia de estado siempre actualizada
            useEffect(() => {
                gameStateRef.current = gameState;
            }, [gameState]);

            useEffect(() => {
                const block = (e) => { if(e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) e.preventDefault(); };
                window.addEventListener('contextmenu', e => e.preventDefault());
                window.addEventListener('keydown', block);
                return () => { window.removeEventListener('contextmenu', e => e.preventDefault()); window.removeEventListener('keydown', block); };
            }, []);

            useEffect(() => {
                const initAuth = async () => { try { await signInAnonymously(auth); } catch (e) { console.error("Error Auth:", e); } };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    try {
                        const urlParams = new URLSearchParams(window.location.search);
                        const urlPin = urlParams.get('pin');
                        if (urlParams.get('display') === 'true') setIsPublicMode(true);
                        if (urlPin && u) validateAndLoadTournament(urlPin);
                    } catch (e) { console.error("Error validando la URL", e); }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'globalSponsors', 'main'), (docSnap) => {
                    if (docSnap.exists()) setGlobalSponsors(docSnap.data().logos || []);
                });
                return () => unsub();
            }, [user]);

            const validateAndLoadTournament = async (pinStr) => {
                if (!user) return;
                if (pinStr === MASTER_PIN) { setAuthMode('admin_cms'); return; }
                try {
                    const docSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', pinStr));
                    if (docSnap.exists()) {
                        if (Date.now() > docSnap.data().expiresAt) setAuthError("Este código ha caducado.");
                        else { setActivePin(pinStr); setAuthMode('scoreboard'); }
                    } else setAuthError("PIN Invalido o no existe.");
                } catch (error) { setAuthError("Error de conexión."); }
            };

            const handleLoginSubmit = (e) => { e.preventDefault(); setAuthError(''); validateAndLoadTournament(pinInput); };

            useEffect(() => {
                if (!user || authMode !== 'scoreboard' || !activePin) return;
                const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'scoreboards', activePin), (docSnap) => {
                    if (docSnap.exists()) setGameState(docSnap.data().gameState);
                });
                return () => unsub();
            }, [user, authMode, activePin]);

            useEffect(() => {
                let intervalId = null;
                if (authMode === 'scoreboard' && !isPublicMode && activePin && (gameState.isTimerRunning || gameState.isMatchClockRunning)) {
                    intervalId = setInterval(() => {
                        const currentState = gameStateRef.current; 
                        let updates = {};
                        
                        if (currentState.isTimerRunning && currentState.timeLeft > 0) updates.timeLeft = currentState.timeLeft - 1;
                        else if (currentState.isTimerRunning && currentState.timeLeft <= 0) updates.isTimerRunning = false;
                        
                        if (currentState.isMatchClockRunning) updates.matchClock = currentState.matchClock + 1;
                        
                        if (Object.keys(updates).length > 0) pushUpdate(updates);
                    }, 1000);
                }
                return () => clearInterval(intervalId);
            }, [gameState.isTimerRunning, gameState.isMatchClockRunning, authMode, isPublicMode, activePin]);

            useEffect(() => {
                if (gameState.sponsors?.length > 0) {
                    const i = setInterval(() => setCurrentSponsorIdx(p => (p + 1) % gameState.sponsors.length), 5000);
                    return () => clearInterval(i);
                }
            }, [gameState.sponsors?.length]);

            useEffect(() => {
                if (gameState.activeView === 'sponsor_full' && globalSponsors.length > 0) {
                    const i = setInterval(() => setCurrentLogoIdx(p => (p + 1) % globalSponsors.length), 4000);
                    return () => clearInterval(i);
                }
            }, [gameState.activeView, globalSponsors.length]);

            const pushUpdate = async (updates) => {
                if (!activePin || isPublicMode) return;
                const currentState = gameStateRef.current;
                const tempState = { ...currentState, ...updates };
                
                if (updates.team1 || updates.team2 || updates.isTieBreak || updates.currentSet) {
                    const autoAlert = calculateAutoAlert(tempState);
                    tempState.tvAlert = autoAlert; 
                }
                
                setGameState(tempState);
                try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scoreboards', activePin), { gameState: tempState }); } catch (e) { }
            };

            const handlePoints = (teamNum, direction) => {
                const currentState = gameStateRef.current;
                const teamKey = teamNum === 1 ? 'team1' : 'team2';
                const team = currentState[teamKey];
                if (currentState.isTieBreak) {
                    let newTb = team.tbPoints;
                    if (direction === 'up') newTb++;
                    if (direction === 'down' && newTb > 0) newTb--;
                    pushUpdate({ [teamKey]: { ...team, tbPoints: newTb } });
                } else {
                    const curr = POINTS.indexOf(team.points);
                    let nIdx = curr;
                    if (direction === 'up' && curr < POINTS.length - 1) nIdx++;
                    if (direction === 'down' && curr > 0) nIdx--;
                    pushUpdate({ [teamKey]: { ...team, points: POINTS[nIdx] } });
                }
            };

            const updateGames = (teamNum, direction) => {
                const currentState = gameStateRef.current;
                const teamKey = teamNum === 1 ? 'team1' : 'team2';
                const team = currentState[teamKey];
                let newSets = [...team.sets];
                if (direction === 'up' && newSets[currentState.currentSet] < 7) newSets[currentState.currentSet]++;
                if (direction === 'down' && newSets[currentState.currentSet] > 0) newSets[currentState.currentSet]--;
                pushUpdate({ [teamKey]: { ...team, sets: newSets } });
            };

            const resetPoints = (teamNum) => {
                const currentState = gameStateRef.current;
                const teamKey = teamNum === 1 ? 'team1' : 'team2';
                const team = currentState[teamKey];
                pushUpdate({ [teamKey]: { ...team, points: '0', tbPoints: 0 } });
            };

            const resetGames = (teamNum) => {
                const currentState = gameStateRef.current;
                const teamKey = teamNum === 1 ? 'team1' : 'team2';
                const team = currentState[teamKey];
                let newSets = [...team.sets];
                newSets[currentState.currentSet] = 0;
                pushUpdate({ [teamKey]: { ...team, sets: newSets } });
            };

            // NUEVA FUNCIÓN: Ganador automático de Tie Break
            const winTieBreak = (teamNum) => {
                const currentState = gameStateRef.current;
                const teamKey = teamNum === 1 ? 'team1' : 'team2';
                const otherTeamKey = teamNum === 1 ? 'team2' : 'team1';
                const team = currentState[teamKey];
                const otherTeam = currentState[otherTeamKey];
                
                let newSets = [...team.sets];
                newSets[currentState.currentSet]++; // Le suma 1 game por ganar el TB
                
                pushUpdate({
                    [teamKey]: { ...team, sets: newSets, tbPoints: 0, points: '0' },
                    [otherTeamKey]: { ...otherTeam, tbPoints: 0, points: '0' },
                    isTieBreak: false, // Desactiva modo Tie Break
                    tvAlert: ''
                });
            };

            const addTickerMessage = () => {
                const currentState = gameStateRef.current;
                if(!newTickerMsg.trim()) return;
                pushUpdate({ sponsors: [...(currentState.sponsors || []), newTickerMsg.trim()] });
                setNewTickerMsg('');
            };

            const removeTickerMessage = (idx) => {
                const currentState = gameStateRef.current;
                const updated = [...(currentState.sponsors || [])];
                updated.splice(idx, 1);
                pushUpdate({ sponsors: updated });
            };

            const saveMatchAndReset = () => {
                const currentState = gameStateRef.current;
                if (!window.confirm('¿Seguro que deseas GUARDAR ESTE PARTIDO y reiniciar el marcador a cero?')) return;
                const newMatch = {
                    id: Date.now(),
                    date: new Date().toLocaleDateString(),
                    phase: currentState.tournamentPhase,
                    category: currentState.category,
                    team1: { p1: currentState.team1.p1, p2: currentState.team1.p2, sets: [...currentState.team1.sets] },
                    team2: { p1: currentState.team2.p1, p2: currentState.team2.p2, sets: [...currentState.team2.sets] }
                };
                const updatedHistory = [newMatch, ...(currentState.matchHistory || [])];
                pushUpdate({
                    matchHistory: updatedHistory,
                    team1: { ...currentState.team1, sets: [0,0,0], points: '0', tbPoints: 0 },
                    team2: { ...currentState.team2, sets: [0,0,0], points: '0', tbPoints: 0 },
                    currentSet: 0,
                    isTieBreak: false,
                    tvAlert: '',
                    matchClock: 0,
                    isMatchClockRunning: false
                });
            };

            const formatTime = (seconds, includeHours = false) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                if (includeHours && h > 0) return `${h}:${m}:${s}`;
                return `${m}:${s}`;
            };

            const getAlertConfig = (alertType) => {
                switch(alertType) {
                    case 'PUNTO DE ORO': return { bg: 'from-transparent via-yellow-600/80 to-transparent', border: 'border-yellow-400', text: 'text-yellow-400 animate-pulse drop-shadow-[0_0_10px_rgba(250,204,21,0.8)]' };
                    case 'SET POINT': return { bg: 'from-transparent via-orange-600/80 to-transparent', border: 'border-orange-500', text: 'text-orange-400 animate-pulse drop-shadow-[0_0_10px_rgba(249,115,22,0.8)]' };
                    case 'MATCH POINT': return { bg: 'from-transparent via-red-600/80 to-transparent', border: 'border-red-500', text: 'text-red-400 animate-pulse drop-shadow-[0_0_10px_rgba(239,68,68,0.8)]' };
                    case 'TOURNAMENT POINT': return { bg: 'from-transparent via-amber-600/90 to-transparent', border: 'border-amber-300 shadow-[0_0_30px_rgba(251,191,36,0.6)]', text: 'bg-clip-text text-transparent bg-gradient-to-r from-yellow-200 via-amber-400 to-yellow-200 animate-tournament-point text-3xl' };
                    default: return { bg: 'from-transparent via-gray-600/80 to-transparent', border: 'border-gray-500', text: 'text-white' };
                }
            };

            const calculateSetsWon = (teamNum) => {
                let won = 0;
                for(let i=0; i<3; i++) {
                    if (gameState.team1.sets[i] >= 6 && gameState.team1.sets[i] > gameState.team2.sets[i] && teamNum === 1) won++;
                    if (gameState.team2.sets[i] >= 6 && gameState.team2.sets[i] > gameState.team1.sets[i] && teamNum === 2) won++;
                }
                return won;
            };

            if (authMode === 'login') {
                return (
                    <div className="h-screen overflow-y-auto custom-scrollbar flex items-center justify-center relative">
                        <BackgroundFX activeView="scoreboard" themeKey="pink" />
                        <div className="z-10 bg-black/60 backdrop-blur-2xl p-10 rounded-2xl border border-white/10 shadow-[0_0_50px_rgba(219,39,119,0.3)] w-full max-w-md text-center text-white">
                            <div className="mx-auto w-20 h-20 bg-pink-600/20 rounded-full flex items-center justify-center mb-6 border border-pink-500/50">
                                <i className="fa-solid fa-shield-halved text-pink-500 text-[36px]"></i>
                            </div>
                            <h1 className="text-3xl font-tv-header tracking-widest uppercase mb-2">Acceso al Sistema</h1>
                            <p className="text-gray-400 text-sm tracking-wider mb-8 font-tv-numbers">INTRODUZCA SU PIN DE TORNEO</p>
                            <form onSubmit={handleLoginSubmit} className="space-y-6">
                                <div>
                                    <div className="relative">
                                        <i className="fa-solid fa-key absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500 text-[20px]"></i>
                                        <input type="password" value={pinInput} onChange={e => setPinInput(e.target.value)} placeholder="000000" className="w-full bg-black/50 border border-white/20 text-white font-bold text-center text-2xl py-4 rounded-xl focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition-all font-tv-numbers tracking-[0.5em]" autoFocus/>
                                    </div>
                                    {authError && <p className="text-red-500 text-xs font-bold mt-3 animate-pulse tracking-widest uppercase">{authError}</p>}
                                </div>
                                <button type="submit" className="w-full bg-gradient-to-r from-pink-600 to-indigo-600 text-white font-black py-4 rounded-xl uppercase tracking-widest hover:opacity-90 transition-opacity shadow-lg font-tv-header text-lg">CONECTAR</button>
                            </form>
                        </div>
                        <div className="absolute bottom-8 flex flex-col items-center opacity-50 text-white">
                            <img src="https://i.imgur.com/FnYqHyv.png" className="h-10 mb-2 object-contain" />
                            <span className="text-[9px] font-bold tracking-[0.2em] uppercase">Powered by NovaBit Media Agency</span>
                        </div>
                    </div>
                );
            }

            if (authMode === 'admin_cms') return <AdminCMS db={db} user={user} appId={appId} setAuthMode={setAuthMode} globalSponsors={globalSponsors} />;

            const activeTheme = THEMES[gameState.theme] || THEMES.pink;
            const isPuntoDeOro = gameState.tvAlert === 'PUNTO DE ORO';

            return (
                <div className="min-h-screen text-white relative flex flex-col">
                    <BackgroundFX activeView={gameState.activeView} themeKey={gameState.theme} />

                    {!isPublicMode && (
                        <button onClick={() => setShowControls(true)} className={`fixed bottom-6 right-6 z-50 ${activeTheme.bg1} backdrop-blur-md p-4 rounded-full border border-white/20 shadow-xl hover:scale-110 transition-transform`}>
                            <i className="fa-solid fa-gear text-[28px]"></i>
                        </button>
                    )}

                    {/* MENÚ OPERADOR LATERAL */}
                    {!isPublicMode && (
                        <div className={`fixed right-0 top-0 h-full w-[450px] bg-gray-900/95 backdrop-blur-xl border-l border-white/10 z-50 transform transition-transform duration-500 ease-in-out ${showControls ? 'translate-x-0' : 'translate-x-full'} shadow-2xl flex flex-col`} onContextMenu={(e) => e.stopPropagation()}>
                            <div className="p-4 border-b border-white/10 flex justify-between items-center bg-black/80">

                                <div className={`absolute inset-0 ${gameState.activeView === 'halftime' ? 'bg-cyan-500 opacity-40' : activeTheme.bg1 + ' opacity-50'} blur-2xl group-hover:opacity-70 transition-opacity`}></div>
                                <div className={`relative bg-black/80 border ${gameState.activeView === 'halftime' ? 'border-cyan-500/30 shadow-[0_0_50px_rgba(6,182,212,0.2)]' : 'border-white/20'} backdrop-blur-xl px-20 py-10 rounded-2xl flex items-center justify-center`}>
                                    <span className={`text-8xl md:text-[12rem] font-tv-numbers font-black tracking-widest leading-none ${gameState.activeView === 'halftime' ? 'text-cyan-400' : 'text-white'}`}>{formatTime(gameState.timeLeft)}</span>
                                </div>
                            </div>
                        </div>

                        {/* 3. SPONSOR FULL */}
                        <div className={`w-full h-full transition-all duration-700 absolute flex items-center justify-center ${gameState.activeView === 'sponsor_full' ? 'opacity-100 scale-100 z-20' : 'opacity-0 scale-95 pointer-events-none z-0'}`}>
                            <div className="text-center space-y-12 w-full max-w-5xl p-20 bg-black/60 backdrop-blur-2xl border border-white/10 rounded-3xl relative overflow-hidden shadow-2xl">
                                <div className={`absolute top-0 left-0 w-full h-1 bg-gradient-to-r ${activeTheme.gradient}`}></div>
                                <h3 className="text-3xl font-tv-header font-bold tracking-[0.4em] text-gray-400 uppercase">Torneo Oficial</h3>
                                <div className="h-72 w-full flex items-center justify-center relative">
                                    {globalSponsors && globalSponsors.length > 0 ? (
                                        globalSponsors.map((url, idx) => (
                                            <img key={idx} src={url} className={`absolute max-w-full max-h-full object-contain transition-opacity duration-1000 ${idx === currentLogoIdx ? 'opacity-100 scale-100' : 'opacity-0 scale-95'}`} />
                                        ))
                                    ) : <div className="text-5xl md:text-7xl font-tv-header tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-white via-gray-200 to-gray-600 opacity-30">AGENCIA NOVABIT</div>}
                                </div>
                            </div>
                        </div>

                        {/* 4. HISTORIAL DE PARTIDOS */}
                        <div className={`w-full max-w-5xl transition-all duration-700 absolute flex flex-col justify-start pt-10 h-full ${gameState.activeView === 'history' ? 'opacity-100 scale-100 z-20' : 'opacity-0 scale-95 pointer-events-none z-0'}`}>
                            <div className={`mb-8 border-b-4 ${activeTheme.border} pb-2 text-center`}>
                                <h2 className="text-4xl font-tv-header tracking-[0.3em] text-white uppercase">Historial del Torneo</h2>
                            </div>
                            <div className="space-y-4 overflow-y-auto custom-scrollbar pr-4 pb-20">
                                {gameState.matchHistory && gameState.matchHistory.length > 0 ? gameState.matchHistory.slice(0, 5).map((match, i) => (
                                    <div key={i} className="bg-black/60 backdrop-blur-xl border border-white/10 rounded-xl p-4 shadow-xl flex items-center justify-between">
                                        <div className="flex-1 space-y-3">
                                            <div className="flex gap-3 text-[10px] font-bold tracking-widest text-gray-400 uppercase">
                                                <span className={`${activeTheme.text}`}>{match.category}</span> | <span>{match.phase}</span> | <span>{match.date}</span>
                                            </div>
                                            <div className="flex justify-between items-center bg-white/5 p-3 rounded">
                                                <span className="font-tv-header text-xl">{match.team1.p1} / {match.team1.p2}</span>
                                                <div className="flex gap-2">{match.team1.sets.map((s, idx) => <span key={idx} className="w-8 text-center font-tv-numbers text-2xl">{s}</span>)}</div>
                                            </div>
                                            <div className="flex justify-between items-center bg-white/5 p-3 rounded">
                                                <span className="font-tv-header text-xl">{match.team2.p1} / {match.team2.p2}</span>
                                                <div className="flex gap-2">{match.team2.sets.map((s, idx) => <span key={idx} className="w-8 text-center font-tv-numbers text-2xl">{s}</span>)}</div>
                                            </div>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="text-center py-20 text-gray-500 font-tv-header tracking-widest uppercase text-2xl">Aún no hay partidos registrados</div>
                                )}
                            </div>
                        </div>

                    </div>

                    {/* BANNER INFERIOR DINÁMICO */}
                    <div className={`fixed bottom-0 left-0 w-full bg-gradient-to-r from-black/90 via-black/80 to-black/90 backdrop-blur-xl border-t border-white/10 h-14 flex items-center px-8 transition-transform duration-500 z-30 ${gameState.activeView === 'sponsor_full' ? 'translate-y-full' : 'translate-y-0'}`}>
                        <div className="flex-1 overflow-hidden relative h-full">
                            {gameState.sponsors?.length > 0 && (
                                <div key={currentSponsorIdx} className="absolute inset-0 flex items-center text-sm md:text-base font-bold tracking-[0.2em] uppercase animate-[slideInRight_0.5s_ease-out_forwards] font-tv-header">
                                    <i className={`fa-solid fa-chevron-right text-[20px] ${activeTheme.text} mr-4`}></i> {gameState.sponsors[currentSponsorIdx]}
                                </div>
                            )}
                        </div>
                        <div className="ml-4 pl-4 border-l border-white/20 flex items-center gap-6">
                            <div className="flex items-center gap-2 text-xs font-bold tracking-widest text-gray-400 uppercase shrink-0">
                                <div className="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.8)]"></div> EN DIRECTO
                            </div>
                            <div className="hidden md:flex items-center gap-3 border-l border-white/20 pl-6 opacity-60">
                                <img src="https://i.imgur.com/FnYqHyv.png" className="h-6 object-contain" />
                                <div className="flex flex-col justify-center">
                                    <span className="text-[8px] text-gray-300 font-bold tracking-[0.2em] uppercase leading-tight mb-0.5">Powered by NovaBit Media Agency</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- COMPONENTE CMS (PANEL MAESTRO DE AGENCIA) ---
        function AdminCMS({ db, user, appId, setAuthMode, globalSponsors }) {
            const [tournaments, setTournaments] = useState([]);
            const [clientName, setClientName] = useState('');
            const [daysValid, setDaysValid] = useState(1);
            const [customLogo, setCustomLogo] = useState('');
            const [newLogoUrl, setNewLogoUrl] = useState('');
            const [lastGeneratedPin, setLastGeneratedPin] = useState(null);

            useEffect(() => {
                const unsub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'tournaments'), (snap) => {
                    const list = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    setTournaments(list);
                });
                return () => unsub();
            }, []);

            const generatePin = () => Math.floor(100000 + Math.random() * 900000).toString();

            const handleCreateTournament = async (e) => {
                e.preventDefault();
                if(!clientName) return;
                const pin = generatePin();
                const expiresAt = Date.now() + (daysValid * 24 * 60 * 60 * 1000); 
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', pin), { pin, clientName, expiresAt, createdAt: Date.now() });
                    const initialState = { ...DEFAULT_GAME_STATE, tournamentLogo: customLogo };
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scoreboards', pin), { gameState: initialState });
                    setLastGeneratedPin({ pin, clientName });
                    setClientName(''); setCustomLogo(''); 
                    setTimeout(() => setLastGeneratedPin(null), 20000);
                } catch(e) { console.error("Error creando:", e); }
            };

            const handleDelete = async (pin) => {
                if(!window.confirm('¿Borrar este torneo?')) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', pin));
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scoreboards', pin));
            };

            const addGlobalSponsor = async () => {
                if(!newLogoUrl) return;
                const updated = [...globalSponsors, newLogoUrl];
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'globalSponsors', 'main'), { logos: updated });
                setNewLogoUrl('');
            };

            const removeGlobalSponsor = async (idx) => {
                const updated = [...globalSponsors];
                updated.splice(idx, 1);
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'globalSponsors', 'main'), { logos: updated });
            };

            return (
                <div className="h-screen overflow-y-auto custom-scrollbar bg-gray-900 text-white p-8 font-sans">
                    <div className="max-w-6xl mx-auto space-y-8">
                        <div className="flex justify-between items-center border-b border-white/10 pb-4">
                            <div className="flex items-center gap-4">
                                <img src="https://i.imgur.com/FnYqHyv.png" className="h-10" />
                                <div><h1 className="text-2xl font-tv-header tracking-widest text-pink-500 uppercase">NovaBit CMS Master</h1><p className="text-gray-400 text-xs tracking-[0.2em] font-tv-header">PANEL DE GESTIÓN DE SERVICIOS</p></div>
                            </div>
                            <button onClick={() => setAuthMode('login')} className="bg-white/10 hover:bg-white/20 px-4 py-2 rounded font-bold text-xs"><i className="fa-solid fa-right-from-bracket"></i> CERRAR SESIÓN</button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="bg-black/40 p-6 rounded-xl border border-white/5 space-y-6">
                                <h2 className="text-xl font-tv-header tracking-widest uppercase border-b border-white/10 pb-2"><i className="fa-solid fa-key text-pink-500"></i> Generar Licencia</h2>
                                <form onSubmit={handleCreateTournament} className="space-y-4">
                                    <div><label className="text-xs text-gray-400 font-bold">NOMBRE DEL CLIENTE/TORNEO</label><input type="text" value={clientName} onChange={e=>setClientName(e.target.value)} className="w-full bg-black/50 border border-white/20 rounded p-3 text-white mt-1 font-tv-header" required/></div>
                                    <div><label className="text-xs text-gray-400 font-bold">LOGO DEL TORNEO (URL OPCIONAL)</label><input type="text" value={customLogo} onChange={e=>setCustomLogo(e.target.value)} placeholder="https://..." className="w-full bg-black/50 border border-white/20 rounded p-3 text-white mt-1"/></div>
                                    <div>
                                        <label className="text-xs text-gray-400 font-bold">DURACIÓN DEL SERVICIO</label>
                                        <select value={daysValid} onChange={e=>setDaysValid(Number(e.target.value))} className="w-full bg-black/50 border border-white/20 rounded p-3 text-white mt-1">
                                            <option value={1}>1 Día (Prueba / Express)</option><option value={3}>3 Días (Fin de Semana)</option><option value={7}>7 Días (Semana Completa)</option><option value={30}>30 Días (Mensual)</option>
                                        </select>
                                    </div>
                                    <button type="submit" className="w-full bg-pink-600 hover:bg-pink-500 text-white font-bold py-3 rounded tracking-widest uppercase font-tv-header text-lg">GENERAR PIN DE ACCESO</button>
                                </form>

                                {lastGeneratedPin && (
                                    <div className="mt-4 bg-green-500/10 border border-green-500/30 rounded-lg p-4 text-center animate-pulse">
                                        <div className="text-green-400 text-xs font-bold tracking-widest uppercase mb-2"><i className="fa-solid fa-circle-check"></i> Licencia Generada Exitosamente</div>
                                        <div className="text-gray-300 text-sm font-bold uppercase font-tv-header">{lastGeneratedPin.clientName}</div>
                                        <div className="text-5xl font-tv-numbers font-black text-white tracking-widest py-3">{lastGeneratedPin.pin}</div>
                                        <div className="text-[10px] text-gray-400 uppercase tracking-widest">Copia este PIN y entrégaselo a tu cliente</div>
                                    </div>
                                )}
                            </div>

                            <div className="bg-black/40 p-6 rounded-xl border border-white/5 space-y-6">
                                <h2 className="text-xl font-tv-header tracking-widest uppercase border-b border-white/10 pb-2"><i className="fa-solid fa-images text-cyan-500"></i> Pantalla Sponsors Globales</h2>
                                <div className="flex gap-2">
                                    <input type="text" value={newLogoUrl} onChange={e=>setNewLogoUrl(e.target.value)} placeholder="URL de la imagen..." className="flex-1 bg-black/50 border border-white/20 rounded px-3" />
                                    <button onClick={addGlobalSponsor} className="bg-cyan-600 px-4 py-2 rounded font-bold hover:bg-cyan-500">AÑADIR</button>
                                </div>
                                <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar pr-2">
                                    {globalSponsors.map((url, idx) => (
                                        <div key={idx} className="flex justify-between items-center bg-white/5 p-2 rounded border border-white/5">
                                            <div className="flex items-center gap-3"><img src={url} className="h-8 w-12 object-contain bg-black/50 rounded" /><span className="text-[10px] text-gray-400 truncate w-40">{url}</span></div>
                                            <button onClick={() => removeGlobalSponsor(idx)} className="text-red-500 hover:text-red-400"><i className="fa-solid fa-trash"></i></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="bg-black/40 p-6 rounded-xl border border-white/5 space-y-4">
                            <h2 className="text-xl font-tv-header tracking-widest uppercase border-b border-white/10 pb-2"><i className="fa-solid fa-users text-indigo-500"></i> Licencias Activas</h2>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm text-gray-400">
                                    <thead className="text-xs text-white uppercase bg-white/5 font-tv-header tracking-widest">
                                        <tr><th className="p-3">PIN</th><th className="p-3">Cliente</th><th className="p-3">Creado</th><th className="p-3">Vence</th><th className="p-3 text-center">Estado</th><th className="p-3 text-right">Acción</th></tr>
                                    </thead>
                                    <tbody>
                                        {tournaments.map(t => {
                                            const isExpired = Date.now() > t.expiresAt;
                                            return (
                                                <tr key={t.id} className="border-b border-white/5 hover:bg-white/5">
                                                    <td className="p-3 font-tv-numbers font-bold text-pink-400">{t.pin}</td>
                                                    <td className="p-3 text-white font-bold">{t.clientName}</td>
                                                    <td className="p-3">{new Date(t.createdAt).toLocaleDateString()}</td>
                                                    <td className="p-3">{new Date(t.expiresAt).toLocaleDateString()}</td>
                                                    <td className="p-3 text-center">{isExpired ? <span className="bg-red-500/20 text-red-500 px-2 py-1 rounded text-xs font-bold">VENCIDO</span> : <span className="bg-green-500/20 text-green-500 px-2 py-1 rounded text-xs font-bold">ACTIVO</span>}</td>
                                                    <td className="p-3 text-right">
                                                        <button onClick={() => window.open(`?pin=${t.pin}`, '_blank')} className="text-blue-400 hover:text-blue-300 mr-4" title="Entrar a controlar/ver torneo"><i className="fa-solid fa-eye"></i></button>
                                                        <button onClick={() => handleDelete(t.pin)} className="text-red-500 hover:text-white" title="Eliminar torneo"><i className="fa-solid fa-trash"></i></button>
                                                    </td>
                                                </tr>
                                            )
                                        })}
                                        {tournaments.length === 0 && <tr><td colSpan="6" className="text-center p-6 italic">No hay torneos registrados.</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
